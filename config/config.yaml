server:
  grpc_port: 50052
  env: development
 
database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: payment_db
  sslmode: disable
 
auth_grpc:
  address: "localhost:50051"
  canonical_secret: "dev-canonical"
  service_name: "payment-gateway"
  timeout: "5s"
 
kafka:
  enabled: false
  brokers:
    - "localhost:9092"
  topic: "payment-gateway-logs"
  group_id: "payment-log-consumer"
  log_dir: "./logs"