apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mock-razorpay-ingress
  namespace: auth
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /mock(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: mock-razorpay-service
                port:
                  number: 8090